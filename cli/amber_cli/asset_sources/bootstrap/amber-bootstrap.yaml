AWSTemplateFormatVersion: "2010-09-09"
Description: "Bootstrap IAM user for pre-release Amber deploys."

Parameters:
  UserName:
    Type: String
    Default: amber-deployer

Resources:
  AmberDeployerUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref UserName
      Policies:
        - PolicyName: amber-pre-release-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - cloudfront:*
                  - cloudwatch:*
                  - ec2:*
                  - ecr:*
                  - ecs:*
                  - elasticloadbalancing:*
                  - iam:AttachRolePolicy
                  - iam:CreatePolicy
                  - iam:CreateRole
                  - iam:DeletePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:Get*
                  - iam:List*
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - logs:*
                  - rds:*
                  - s3:*
                  - secretsmanager:*
                  - ssm:*
                Resource: "*"
  AmberDeployerAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref AmberDeployerUser

Outputs:
  AccessKeyId:
    Description: "Configure this with aws configure --profile amber."
    Value: !Ref AmberDeployerAccessKey
  SecretAccessKey:
    Description: "Secret key for aws configure --profile amber."
    Value: !GetAtt AmberDeployerAccessKey.SecretAccessKey
